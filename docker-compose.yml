version: "3.9"

services:
  app:
    build: .
    image: microwebfrwk:latest
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

